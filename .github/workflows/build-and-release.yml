name: Build and Release

on:
  push:
    branches: [ "main", "master" ]
    tags: [ 'v*.*.*' ]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: thornex/music-party
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # 1. 构建 Docker 镜像 (Linux)
  build-and-push-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 2. 构建 Windows 便携式 EXE
  build-windows-exe:
    runs-on: windows-latest
    # 仅在推送 Tag 时执行 EXE 发布，或通过 workflow_dispatch 手动触发
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout MusicParty
        uses: actions/checkout@v4

      - name: Checkout Netease API
        uses: actions/checkout@v4
        with:
          repository: Binaryify/NeteaseCloudMusicApi
          path: netease-api-src

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: music-party-web/package-lock.json

      - name: Verify Node Version
        run: node -v

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true
          cache-dependency-path: launcher/go.mod

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Frontend
        run: |
          cd music-party-web
          npm install
          npm run build

      - name: Build Java Backend
        run: |
          if (Test-Path "src/main/resources/static") { rm -r src/main/resources/static }
          mkdir -p src/main/resources/static
          cp -r music-party-web/dist/* src/main/resources/static/
          mvn clean package -DskipTests

      - name: Build Netease API EXE
        run: |
          cd netease-api-src
          npm install
          npx pkg . -t node18-win-x64 -o ../launcher/bin/netease-api.exe

      - name: Prepare Assets
        run: |
          if (!(Test-Path "launcher/bin")) { mkdir launcher/bin }
          cp target/music-party-*.jar launcher/bin/server.jar

      - name: Build Wails Launcher
        run: |
          cd launcher
          go mod tidy
          npm install --prefix frontend
          wails build -platform windows/amd64

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v1
        with:
          files: launcher/build/bin/MusicParty.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
